<!DOCTYPE html>
<html>
<body style="text-align:center; background:black; color:white;">

<h1>🎵 Hang vezérlés</h1>

<!-- KÉP -->
<img id="kep" src="kep.jpg" width="400" style="display:none; margin:20px auto; border-radius:10px;">

<br>

<!-- GOMBOK -->
<button onclick="playAudio()" 
style="font-size:35px; padding:20px 40px; background:green; color:white; border:none; border-radius:10px; margin:10px;">
▶️ Indítás
</button>

<button onclick="stopAudio()" 
style="font-size:35px; padding:20px 40px; background:red; color:white; border:none; border-radius:10px; margin:10px;">
⏹ Leállítás
</button>

<br><br>

<!-- HANG -->
<audio id="audio" autoplay>
  <source src="Voicy_Impearial March.mp3" type="audio/mpeg">
</audio>

<script>
let audio = document.getElementById("audio");

function playAudio() {
  let kep = document.getElementById("kep");

  audio.volume = 0.2;
  audio.play().catch(() => {});

  kep.style.display = "none";
}

function stopAudio() {
  let kep = document.getElementById("kep");

  audio.pause();
  audio.currentTime = 0;

  kep.style.display = "block";
}

// 🔥 AUTOMATIKUS INDÍTÁS PRÓBÁLKOZÁS
window.onload = function() {
  audio.volume = 0.2;
  audio.play().catch(() => {
    console.log("Autoplay blokkolva");
  });
};
</script>

</body>
</html>
